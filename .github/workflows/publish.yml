name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted publishing (OIDC) needs npm >= 11.5.1
      - run: npm install -g npm@latest
      - name: Check release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version package.json)
          if [ "$TAG" != "$PKG" ]; then
            echo "Release tag $TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm ci
      - run: npm publish
